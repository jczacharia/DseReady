LoadModule rewrite_module "/opt/rh/httpd24/root/usr/lib64/httpd/modules/mod_rewrite.so"

RewriteEngine On
RewriteRule "^index\.html$" "-" [L]

# Pass through real files and directories under DOCUMENT_ROOT.
RewriteCond "%{DOCUMENT_ROOT}%{REQUEST_URI}" "-f" [OR]
RewriteCond "%{DOCUMENT_ROOT}%{REQUEST_URI}" "-d"
RewriteRule "^" "-" [L]

# Anything else falls through to the Angular SPA shell so client-side routing
# can take over. /api/* is excluded so it stays available for the ProxyPass
# rule in rproxy.conf (the outer reverse proxy already routes /adv/api/*
# straight to searchapi, so this rule is unreachable for browser traffic
# today — kept for parity with the outer config and as a defensive default).
RewriteCond "%{REQUEST_URI}" "!^/api(/|$)"
RewriteRule "." "/index.html" [L]

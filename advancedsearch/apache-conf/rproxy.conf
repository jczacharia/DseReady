LoadModule slotmem_shm_module        "/opt/rh/httpd24/root/usr/lib64/httpd/modules/mod_slotmem_shm.so"
LoadModule proxy_module              "/opt/rh/httpd24/root/usr/lib64/httpd/modules/mod_proxy.so"
LoadModule proxy_balancer_module     "/opt/rh/httpd24/root/usr/lib64/httpd/modules/mod_proxy_balancer.so"
LoadModule lbmethod_byrequests_module "/opt/rh/httpd24/root/usr/lib64/httpd/modules/mod_lbmethod_byrequests.so"
LoadModule proxy_http_module         "/opt/rh/httpd24/root/usr/lib64/httpd/modules/mod_proxy_http.so"
LoadModule proxy_ajp_module          "/opt/rh/httpd24/root/usr/lib64/httpd/modules/mod_proxy_ajp.so"

# ---------------------------------------------------------------------------
# Upstream pools
# ---------------------------------------------------------------------------

# New advanced search API (.NET 8 / ASP.NET Core)
# stickysession=JSESSIONID is a Java-EE convention and is a no-op for .NET; safe
# only while searchapi runs as a single replica. If you scale out and adopt
# SignalR (MapHub), either move to ASP.NET Core session-cookie stickiness or
# add a Redis backplane.
<Proxy "balancer://searchapi">
   BalancerMember "http://searchapi:8080"
   ProxySet stickysession=JSESSIONID
</Proxy>

# ---------------------------------------------------------------------------
# Route mapping
# ---------------------------------------------------------------------------

# Intra-pod fallback to searchapi. Note this is UNREACHABLE for browser traffic
# in the deployed topology: the outer reverse proxy in
# `dse-elastic-workplace-search-ui` already routes /adv/api/* directly to
# searchapi, so requests never traverse this pod's /api/* rule. The rule is
# kept aligned with the new searchapi (which uses UsePathBase("/api") and a
# strict 404 gate on unprefixed paths) so it stays correct if Angular SSR is
# ever enabled or if this pod's apache is pointed at a different backend in
# local dev. The /api/ prefix is PRESERVED on the way to the upstream.
ProxyPass        "/api/" "balancer://searchapi/api/"
ProxyPassReverse "/api/" "balancer://searchapi/api/"

# ---------------------------------------------------------------------------
# Forwarded headers for searchapi
#
# When the outer reverse proxy DOES traverse this pod (it does not today), or
# if anyone hits /api/ on the pod directly, hand searchapi the prefix it needs
# to advertise the correct external URL in its OpenAPI document. Scoped via
# <LocationMatch> so unrelated routes are unaffected. mod_headers is loaded by
# the base image (pingheader.conf already uses `Header set`).
# ---------------------------------------------------------------------------
<LocationMatch "^/api/">
    RequestHeader set       X-Forwarded-Prefix "/adv"
    RequestHeader setifempty X-Forwarded-Proto "https"
</LocationMatch>

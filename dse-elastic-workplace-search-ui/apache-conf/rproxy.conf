LoadModule proxy_module      "/opt/rh/httpd24/root/usr/lib64/httpd/modules/mod_proxy.so"
LoadModule proxy_http_module "/opt/rh/httpd24/root/usr/lib64/httpd/modules/mod_proxy_http.so"

# ---------------------------------------------------------------------------
# Route mapping  (order matters: most specific path first!)
# Each upstream is a Service VIP that already load-balances across its pods, so proxy
# straight to it — no mod_proxy_balancer/mod_slotmem_shm needed for a single backend.
# retry=0: a backend that was briefly down (pod restart/OOM) is retried immediately
# instead of being benched 60s (AH00959), which is what turned a backend blip into a
# sticky /adv outage.
# ---------------------------------------------------------------------------

# /adv/api/*  -> Advanced search API (searchapi)
ProxyPass        "/adv/api/" "http://searchapi:8080/api/" retry=0
ProxyPassReverse "/adv/api/" "http://searchapi:8080/api/"

# /adv/*      -> Advanced search UI pod (must come AFTER /adv/api/)
ProxyPass        "/adv/"     "http://dse-advanced-search:8080/" retry=0
ProxyPassReverse "/adv/"     "http://dse-advanced-search:8080/"

# /api/*      -> Legacy dsesearchapi
ProxyPass        "/api/"     "http://dsesearchapi:8080/api/" retry=0
ProxyPassReverse "/api/"     "http://dsesearchapi:8080/api/"

# Tell searchapi its external prefix so Swashbuckle emits the correct `servers` URL.
<LocationMatch "^/adv/api/">
    RequestHeader set        X-Forwarded-Prefix "/adv"
    RequestHeader setifempty X-Forwarded-Proto  "https"
</LocationMatch>

LoadModule slotmem_shm_module        "/opt/rh/httpd24/root/usr/lib64/httpd/modules/mod_slotmem_shm.so"
LoadModule proxy_module              "/opt/rh/httpd24/root/usr/lib64/httpd/modules/mod_proxy.so"
LoadModule proxy_balancer_module     "/opt/rh/httpd24/root/usr/lib64/httpd/modules/mod_proxy_balancer.so"
LoadModule lbmethod_byrequests_module "/opt/rh/httpd24/root/usr/lib64/httpd/modules/mod_lbmethod_byrequests.so"
LoadModule proxy_http_module         "/opt/rh/httpd24/root/usr/lib64/httpd/modules/mod_proxy_http.so"
LoadModule proxy_ajp_module          "/opt/rh/httpd24/root/usr/lib64/httpd/modules/mod_proxy_ajp.so"

# ---------------------------------------------------------------------------
# Upstream pools
# ---------------------------------------------------------------------------

# Legacy backend (the original DSE search API)
<Proxy "balancer://appcluster">
   BalancerMember "http://dsesearchapi:8080"
   ProxySet stickysession=JSESSIONID
</Proxy>

# Advanced search API (NOT dsesearchapi)
<Proxy "balancer://searchapi">
   BalancerMember "http://searchapi:8080"
   ProxySet stickysession=JSESSIONID
</Proxy>

# Advanced search UI pod
<Proxy "balancer://advancedsearch">
   BalancerMember "http://dse-advanced-search:8080"
   ProxySet stickysession=JSESSIONID
</Proxy>

# ---------------------------------------------------------------------------
# Route mapping  (order matters: most specific path first!)
# ---------------------------------------------------------------------------

# /adv/api/*  -> Advanced search API pod
ProxyPass        "/adv/api/" "balancer://searchapi/api/"
ProxyPassReverse "/adv/api/" "balancer://searchapi/api/"

# /adv/*      -> Advanced search UI pod (must come AFTER /adv/api/)
ProxyPass        "/adv/"     "balancer://advancedsearch/"
ProxyPassReverse "/adv/"     "balancer://advancedsearch/"

# /api/*      -> Legacy dsesearchapi
ProxyPass        "/api/"     "balancer://appcluster/api/"
ProxyPassReverse "/api/"     "balancer://appcluster/api/"

# Tell searchapi its external prefix so Swashbuckle emits the correct `servers` URL.
<LocationMatch "^/adv/api/">
    RequestHeader set       X-Forwarded-Prefix "/adv"
    RequestHeader setifempty X-Forwarded-Proto "https"
</LocationMatch>
